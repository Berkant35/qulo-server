<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qulo</title>
</head>
<body style="margin:0;padding:0;font-family:'Segoe UI',Arial,sans-serif;background-color:#FAF5FF;">
  <table role="presentation" style="width:100%;border-collapse:collapse;">
    <tr>
      <td align="center" style="padding:40px 20px;">
        <table role="presentation" style="width:100%;max-width:520px;border-collapse:collapse;background-color:#FFFFFF;border-radius:16px;box-shadow:0 4px 20px rgba(156,39,176,0.15);">
          <tr>
            <td style="padding:35px 20px;text-align:center;background:linear-gradient(135deg,#CE93D8 0%,#9C27B0 50%,#7B1FA2 100%);border-radius:16px 16px 0 0;">
              <h1 style="margin:0;color:#FFFFFF;font-size:36px;font-weight:bold;letter-spacing:3px;">QULO</h1>
              <p style="margin:8px 0 0 0;color:rgba(255,255,255,0.85);font-size:14px;">{{TAGLINE}}</p>
            </td>
          </tr>
          <tr>
            <td style="padding:40px 35px 30px 35px;">
              <h2 style="margin:0 0 15px 0;color:#7B1FA2;font-size:22px;text-align:center;">{{TITLE}}</h2>
              <p style="margin:0 0 25px 0;color:#383838;font-size:15px;line-height:1.7;text-align:center;">{{BODY}}</p>
              <table role="presentation" style="width:100%;border-collapse:collapse;">
                <tr>
                  <td align="center">
                    <a href="{{URL}}" style="display:inline-block;padding:16px 48px;background:linear-gradient(135deg,#9C27B0,#7B1FA2);color:#FFFFFF;text-decoration:none;font-size:16px;font-weight:600;border-radius:12px;box-shadow:0 4px 15px rgba(156,39,176,0.4);">{{BUTTON_TEXT}}</a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
          <tr>
            <td style="padding:0 35px 30px 35px;">
              <div style="padding:18px;background-color:#F3E5F5;border-radius:8px;">
                <p style="margin:0;color:#666666;font-size:12px;text-align:center;line-height:1.6;">
                  {{LINK_FALLBACK}}<br>
                  <a href="{{URL}}" style="color:#9C27B0;word-break:break-all;font-size:11px;">{{URL}}</a>
                </p>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:25px;text-align:center;background-color:#F3E5F5;border-radius:0 0 16px 16px;">
              <p style="margin:0 0 10px 0;color:#383838;font-size:12px;">{{FOOTER_IGNORE}}</p>
              <p style="margin:0;color:#9C27B0;font-size:11px;">&copy; 2026 Qulo</p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
